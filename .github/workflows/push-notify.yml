name: Push Notification

on:
  push:
    branches-ignore: [main, master]

permissions:
  pull-requests: read

jobs:
  notify:
    if: github.event.head_commit != null
    runs-on: ubuntu-latest
    steps:
      - uses: bkuri-org/.github/.github/actions/notify-push@main
        with:
          ntfy-token: ${{ secrets.NTFY_TOKEN }}
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          author: ${{ github.actor }}
          commit-message: ${{ github.event.head_commit.message }}
          compare-url: ${{ github.event.compare }}

