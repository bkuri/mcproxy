name: Push Notification

on:
  push:
    branches-ignore: [main, master]

permissions:
  pull-requests: read

jobs:
  notify:
    if: github.event.head_commit != null
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          COMMIT="${{ github.event.head_commit.message }}"
          COMPARE="${{ github.event.compare }}"
          NTFY_TOKEN="${{ secrets.NTFY_TOKEN }}"

          COMMIT_TITLE=$(echo "$COMMIT" | head -1 | cut -c1-120)
          SHORT_SHA="${SHA:0:7}"
          REPO_SHORT="${REPO#*/}"

          PR_DATA=$(gh api "repos/$REPO/pulls?head=$REPO:$BRANCH&state=open" 2>/dev/null || echo '[]')
          PR_URL=$(echo "$PR_DATA" | jq -r '.[0].html_url // empty')
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number // empty')

          if [ -n "$PR_URL" ]; then
            TITLE="[$REPO_SHORT] PR #$PR_NUMBER — $BRANCH"
            CLICK="$PR_URL"
            TAGS="github,pr"
          else
            TITLE="[$REPO_SHORT] $BRANCH ($SHORT_SHA)"
            CLICK="$COMPARE"
            TAGS="github,push"
          fi

          echo "::group::ntfy notification"
          echo "Title: $TITLE"
          echo "Message: $COMMIT_TITLE"
          echo "Click: $CLICK"
          echo "::endgroup::"

          HTTP_CODE=$(curl -s -o /tmp/ntfy-response -w "%{http_code}" \
            -X POST "https://ntfy.kuri.casa/org" \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: $TITLE" \
            -H "Click: $CLICK" \
            -H "Tags: $TAGS" \
            -H "Priority: default" \
            -d "$COMMIT_TITLE")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::ntfy failed (HTTP $HTTP_CODE)"
            cat /tmp/ntfy-response
            exit 1
          fi
          echo "Notification sent"
